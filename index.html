<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Caseload Management Portal &mdash; M-Powered Education</title>
  <meta name="robots" content="noindex, nofollow" />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: {
              900: '#0f1117',
              800: '#171b26',
              700: '#1e2335',
              600: '#252c42',
              500: '#2e3650',
            },
            accent:  { DEFAULT: '#6c8fff', soft: '#3b5bdb' },
            success: '#34d399',
          },
          fontFamily: {
            sans: ['"Inter"',          'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body { background-color: #0f1117; color: #e8ecf4; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: #171b26; }
    ::-webkit-scrollbar-thumb { background: #2e3650; border-radius: 3px; }
    .nav-link { display: inline-flex; align-items: center; gap: 0.4rem; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 500; color: #7d8fb3; border: 1px solid #252c42; border-radius: 7px; padding: 0.4rem 0.85rem; text-decoration: none; transition: color 0.14s, border-color 0.14s, background 0.14s; white-space: nowrap; }
    .nav-link:hover  { color: #e8ecf4; border-color: #6c8fff; background: rgba(108,143,255,0.07); }
    .nav-link.active { color: #6c8fff; border-color: rgba(108,143,255,0.4); background: rgba(108,143,255,0.06); }
    .btn-ghost { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; color: #7d8fb3; font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 500; border: 1px solid #252c42; border-radius: 7px; padding: 0.4rem 0.85rem; cursor: pointer; transition: color 0.14s, border-color 0.14s, background 0.14s; white-space: nowrap; }
    .btn-ghost:hover { color: #f87171; border-color: rgba(248,113,113,0.45); background: rgba(248,113,113,0.06); }
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 14px; padding: 1.75rem; }
    .hidden { display: none; }
  </style>
</head>

<body class="bg-surface-900 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

  <header class="bg-surface-800 border-b border-surface-700 flex-shrink-0">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="text-[0.95rem] font-bold text-slate-100">M-Powered Education</span>
        <nav class="flex items-center gap-2">
          <a href="/" class="nav-link active">Caseload Portal</a>
        </nav>
      </div>
      <button onclick="logout()" class="btn-ghost">Sign Out</button>
    </div>
  </header>

  <main class="flex-1 max-w-7xl mx-auto w-full px-6 py-8">
    <div class="panel">
        <div id="rosterLoading" class="text-center py-20 text-slate-500">Loading caseload...</div>
        <div id="rosterEmpty" class="hidden text-center py-20 text-slate-500">No students found.</div>
        <div id="rosterError" class="hidden text-center py-20 text-red-400">Error loading data.</div>
        <div id="rosterTableWrap" class="hidden overflow-x-auto">
            <table class="roster-table">
                <tbody id="rosterTbody"></tbody>
            </table>
        </div>
    </div>
  </main>

  <script>
    'use strict';

    var GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbybVEYwsl68FUfUBlOM5aWJXgtbH38mjcjFns0QkY5Patls-QJiSOO3eazstDhOMfJg/exec';

    function getCookie(name) {
      var match = document.cookie.match(new RegExp('(^|;\\s*)' + name + '=([^;]+)'));
      return match ? decodeURIComponent(match) : null;
    }

    function _gasPost(payload) {
      // FIXED: Correctly isolated base URL using array index
      var cleanUrl = GAS_WEBHOOK_URL.split('#').split('?');
      return fetch(cleanUrl, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify(payload)
      })
      .then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      });
    }

    function _showRosterState(state) {
      var loading   = document.getElementById('rosterLoading');
      var empty     = document.getElementById('rosterEmpty');
      var error     = document.getElementById('rosterError');
      var tableWrap = document.getElementById('rosterTableWrap');

      if (loading)   loading.classList.toggle('hidden', state !== 'loading');
      if (empty)     empty.classList.toggle('hidden', state !== 'empty');
      if (error)     error.classList.toggle('hidden', state !== 'error');
      if (tableWrap) tableWrap.classList.toggle('hidden', state !== 'data');
    }

    function loadRoster() {
      _showRosterState('loading');
      _gasPost({ action: 'authCheck' })
        .then(function(authData) {
          if(authData.token) {
            localStorage.setItem('auth_token', authData.token);
            return _gasPost({ action: 'getRoster' });
          } else {
            throw new Error('Not authenticated');
          }
        })
        .then(function (data) {
          _showRosterState('data');
          // Add your rendering logic here
        })
        .catch(function (err) {
          console.error('[loadRoster] Auth failed:', err);
          _showRosterState('error');
          window.location.replace('https://www.mpowerededucation.com/index.html?next=' + encodeURIComponent(window.location.href));
        });
    }

    function logout() {
      try { localStorage.clear(); } catch (e) {}
      window.location.replace('https://www.mpowerededucation.com/index.html');
    }

    document.addEventListener('DOMContentLoaded', loadRoster);
  </script>
</body>
</html>
