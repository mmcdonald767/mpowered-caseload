<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { height: 100%; margin: 0; background-color: #0f1117; color: #e8ecf4; }
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .btn { cursor: pointer; padding: 0.35rem 0.8rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; border: 1px solid transparent; }
    .btn-edit { background: rgba(108,143,255,0.1); color: #6c8fff; }
    .btn-save { background: rgba(52,211,153,0.1); color: #34d399; }
    .field-input { background: #0f1117; border: 1px solid #252c42; padding: 0.5rem; width: 100%; color: #fff; margin-bottom: 0.5rem; }
    #content-area { display: none; }
    #content-area.active { display: block; }
  </style>
</head>
<body class="p-6">
  <main id="content-area" class="active max-w-2xl mx-auto">
    
    <!-- Student Identifiers -->
    <div class="panel" id="panel-identity">
      <div class="flex justify-between mb-4"><span>Student Identifiers</span><button class="btn btn-edit" onclick="editPanel('identity')">Edit</button></div>
      <div id="view-identity">
        <p>ID: <span id="rv-studentId"></span></p>
        <p>Name: <span id="rv-firstName"></span> <span id="rv-lastName"></span></p>
      </div>
      <div id="edit-identity" style="display:none;">
        <input class="field-input" id="in-studentId" />
        <input class="field-input" id="in-firstName" />
        <input class="field-input" id="in-lastName" />
        <button class="btn btn-save" onclick="savePanel('identity')">Save changes</button>
      </div>
    </div>

    <!-- IEP Goals -->
    <div class="panel" id="panel-goals">
      <div class="flex justify-between mb-4"><span>IEP Goals</span><button class="btn btn-edit" onclick="editPanel('goals')">Edit</button></div>
      <ul id="view-goals"></ul>
      <div id="edit-goals" style="display:none;">
        <div id="goal-rows"></div>
        <button class="btn btn-edit" onclick="addGoalRow('')">+ Add Goal</button>
        <button class="btn btn-save" onclick="savePanel('goals')">Save changes</button>
      </div>
    </div>

    <!-- SDI -->
    <div class="panel" id="panel-sdi">
      <div class="flex justify-between mb-4"><span>SDI</span><button class="btn btn-edit" onclick="editPanel('sdi')">Edit</button></div>
      <ul id="view-sdi"></ul>
      <div id="edit-sdi" style="display:none;">
        <textarea class="field-input" id="in-sdi"></textarea>
        <button class="btn btn-save" onclick="savePanel('sdi')">Save changes</button>
      </div>
    </div>
  </main>

  <script>
    var COL = { ID: 1, FIRST_NAME: 2, LAST_NAME: 3, GOALS: 8, SDI: 9 };
    var _record = []; 

    function editPanel(panel) {
      document.getElementById('view-' + panel).style.display = 'none';
      document.getElementById('edit-' + panel).style.display = 'block';
      if(panel === 'goals') {
        var container = document.getElementById('goal-rows');
        container.innerHTML = '';
        var goals = JSON.parse(_record[COL.GOALS] || '[]');
        goals.forEach(function(g) { addGoalRow(g); });
      }
    }

    function addGoalRow(val) {
      var div = document.createElement('div');
      div.innerHTML = '<input class="field-input" value="'+(val||'')+'">';
      document.getElementById('goal-rows').appendChild(div);
    }

    function savePanel(panel) {
      var updates = {};
      if(panel === 'goals') updates[COL.GOALS] = JSON.stringify(Array.from(document.querySelectorAll('#goal-rows input')).map(i => i.value));
      if(panel === 'sdi') updates[COL.SDI] = JSON.stringify(document.getElementById('in-sdi').value.split('\n'));
      
      console.log("Saving to index:", updates);
      // Call your _gasPost here to finalize
      document.getElementById('view-' + panel).style.display = 'block';
      document.getElementById('edit-' + panel).style.display = 'none';
    }
  </script>
</body>
</html>
