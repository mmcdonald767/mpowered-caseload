<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <meta name="description" content="M-Powered Education — IEP Student Modification &amp; Progress Monitor" />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236c8fff'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='white' font-family='Inter%2C sans-serif' font-weight='700' font-size='18'%3EM%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { 900: '#0f1117', 800: '#171b26', 700: '#1e2335', 600: '#252c42', 500: '#2e3650' },
            accent: { DEFAULT: '#6c8fff', soft: '#3b5bdb', glow: 'rgba(108,143,255,0.18)' },
            success: '#34d399', warn: '#f59e0b', danger: '#ef4444',
          },
          fontFamily: { sans: ['"Inter"', 'system-ui', 'sans-serif'], mono: ['"JetBrains Mono"', 'monospace'] },
        }
      }
    };
  </script>

  <style>
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.45s cubic-bezier(.22,.68,0,1.2) both; }
    .spinner { animation: spin 0.85s linear infinite; }
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 16px; padding: 1.75rem; }
    .section-heading { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; padding-bottom: 0.9rem; border-bottom: 1px solid #1e2335; }
    .btn-edit-section { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.73rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: #6c8fff; background: rgba(108,143,255,0.08); border: 1px solid rgba(108,143,255,0.28); border-radius: 7px; padding: 0.38rem 0.85rem; cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s; }
    .btn-edit-section.done-mode { color: #34d399; background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.3); }
    .read-view { display: block; }
    .edit-view { display: none; }
    .section-editing .read-view { display: none; }
    .section-editing .edit-view { display: block; }
    .rv-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.55rem 1.5rem; }
    .rv-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; color: #4a5578; font-family: 'JetBrains Mono', monospace; }
    .rv-value { font-size: 0.85rem; color: #c9d1e8; font-weight: 500; }
    .field-label { display: block; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; color: #6a7a9b; font-family: 'JetBrains Mono', monospace; margin-bottom: 0.38rem; }
    .field-input, .field-textarea { width: 100%; background: #1e2335; border: 1px solid #252c42; border-radius: 8px; color: #e8ecf4; font-size: 0.85rem; padding: 0.6rem 0.85rem; outline: none; }
    .btn-save { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 600; color: #fff; background: linear-gradient(135deg, #3b5bdb, #6c8fff); border: none; border-radius: 10px; padding: 0.72rem 1.6rem; cursor: pointer; }
    .btn-ghost { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 500; color: #7d8fb3; background: transparent; border: 1px solid #252c42; border-radius: 8px; padding: 0.6rem 1.1rem; cursor: pointer; }
    .save-bar { position: sticky; bottom: 0; z-index: 40; background: linear-gradient(to top, #0f1117 72%, transparent); padding: 1.5rem 0 1.2rem; margin-top: 2rem; }
    #loading-overlay { display: flex; }
    #loading-overlay.hidden { display: none; }
    #content-area { display: none; }
    #content-area.visible { display: block; }
    #fallback-state { display: none; }
    #fallback-state.visible { display: flex; }
    .ferpa-badge { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.62rem; font-weight: 700; text-transform: uppercase; color: #34d399; border: 1px solid rgba(52,211,153,0.28); border-radius: 20px; padding: 0.18rem 0.55rem; background: rgba(52,211,153,0.06); }
  </style>
</head>
<body class="bg-surface-900 text-slate-100 font-sans antialiased min-h-screen flex flex-col">

  <header class="border-b border-surface-700 flex-shrink-0" role="banner">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center brand-glow flex-shrink-0" style="background: linear-gradient(135deg, #3b5bdb, #6c8fff);"><span class="font-bold text-white select-none" style="font-size:11px;">M</span></div>
        <span class="font-mono text-xs font-semibold text-slate-300">M-Powered Education</span>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 py-8" id="main-root">
    <div id="loading-overlay" class="fade-up flex flex-col items-center justify-center py-24 gap-4">
      <svg class="spinner" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6c8fff" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10" stroke="#1e2335"/><path d="M12 2a10 10 0 0110 10" stroke="#6c8fff"/></svg>
      <p class="font-mono text-xs text-slate-500">Retrieving student ledger record…</p>
    </div>

    <div id="fallback-state" class="flex-col items-center justify-center py-24 gap-6 text-center" role="alert">
       <h2 id="fallback-title" class="text-base font-semibold text-slate-200">Record Not Found</h2>
       <p id="fallback-message" class="text-sm text-slate-500">An unexpected error occurred.</p>
       <a href="/index.html" class="nav-link">← Back to Caseload</a>
    </div>

    <div id="content-area">
      <!-- Profile Header -->
      <div class="panel mb-5 fade-up" style="padding: 1.4rem 1.75rem;">
        <h1 id="display-name" class="text-xl font-bold text-slate-100">Loading...</h1>
      </div>

      <!-- Sections rendered dynamically by script -->
      <section id="sec-identity" class="panel mb-5 fade-up" aria-labelledby="identity-heading">
        <div class="section-heading">
          <h2 id="identity-heading" class="text-base font-semibold text-slate-100">Student Identifiers</h2>
          <button type="button" class="btn-edit-section" onclick="_toggleSection('sec-identity', this)">Edit Section</button>
        </div>
        <div class="section-body" id="sec-identity-body">
          <div class="read-view"><dl class="rv-grid"><dt class="rv-label">First Name</dt><dd class="rv-value" id="rv-firstName">—</dd></dl></div>
          <div class="edit-view"><input id="edit-firstName" type="text" class="field-input" placeholder="First name" /></div>
        </div>
      </section>

      <!-- SAVE BAR -->
      <div class="save-bar fade-up">
        <div class="flex items-center justify-between gap-4">
          <span class="ferpa-badge">FERPA Compliant</span>
          <button type="button" id="btn-save-record" class="btn-save" onclick="_saveRecord()">Save Record</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    'use strict';
    var GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbybVEYwsl68FUfUBlOM5aWJXgtbH38mjcjFns0QkY5Patls-QJiSOO3eazstDhOMfJg/exec';
    var COL_ID=1, COL_FIRST=2, COL_LAST=3, COL_IEP_START=4, COL_IEP_END=5, COL_DISABILITY=6, COL_SUPP_AIDS=7, COL_GOALS=8, COL_ACCOM=9;
    var _mode = 'existing';
    var _studentId = '', _studentRow = null, _rosterRows = [], _currentIdx = -1, _goalEditCounter = 0;
    var SECTION_IDS = ['sec-identity', 'sec-timeline', 'sec-disability', 'sec-goals', 'sec-supp', 'sec-assessments'];

    function _escapeHtml(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function _safeParseJSON(str) { try { return JSON.parse(str); } catch (e) { return null; } }
    function _val(id) { var el = document.getElementById(id); return el && el.value.trim() ? el.value.trim() : null; }
    function _q(sel) { return document.querySelector(sel); }

    function _formatDateDisplay(ymd) {
        if (!ymd) return '—';
        var parts = ymd.match(/^(\d{4})-(\d{2})-(\d{2})$/);
        return parts ? parts[2] + '/' + parts[3] + '/' + parts[1] : ymd;
    }

    function _collectGoalsFromEditRows() {
      var goals = [];
      document.querySelectorAll('#goals-edit-container [data-goal-id]').forEach(function(row) {
        var id = row.getAttribute('data-goal-id');
        var desc = (document.getElementById('goal-desc-' + id) || {}).value || '';
        var sdi = (document.getElementById('goal-sdi-' + id) || {}).value || '';
        var dom = (document.getElementById('goal-domain-' + id) || {}).value || '';
        var crit = (document.getElementById('goal-crit-' + id) || {}).value || '';
        if (desc.trim() || sdi.trim()) {
          goals.push({ description: desc.trim(), sdi: sdi.trim(), domain: dom.trim(), target: crit.trim() });
        }
      });
      return goals;
    }

    function _collectStateAccommodations() {
      var checked = [];
      document.querySelectorAll('#sec-assessments input[name="stateAccommodations"]:checked').forEach(function(cb) { checked.push(cb.value); });
      return {
        selections: checked,
        readersType: (_q('input[name="readersType"]:checked') || {}).value || null,
        interpreterType: (_q('input[name="interpretersType"]:checked') || {}).value || null,
        interpreterLang: _val('acc-interp-lang-specify'),
        extendedTimeType: (_q('input[name="extendedTimeType"]:checked') || {}).value || null,
        calculatorType: (_q('input[name="calculatorType"]:checked') || {}).value || null,
        calculatorSpecify: _val('acc-calc-specify'),
        otherSpecify: _val('acc-other-specify')
      };
    }

    function _toggleSection(sectionId, btn) {
        var section = document.getElementById(sectionId);
        if (section.classList.contains('section-editing')) {
            section.classList.remove('section-editing');
            btn.textContent = 'Edit Section';
        } else {
            section.classList.add('section-editing');
            btn.textContent = '✓ Done';
        }
    }

  function _showLoading() {
      document.getElementById('loading-overlay').classList.remove('hidden');
      document.getElementById('content-area').classList.remove('visible');
      document.getElementById('fallback-state').classList.remove('visible');
    }

    function _showContent() {
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('content-area').classList.add('visible');
    }

    function _showFallback(title, msg) {
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('content-area').classList.remove('visible');
      document.getElementById('fallback-state').classList.add('visible');
      if (title) document.getElementById('fallback-title').textContent = title;
      if (msg)   document.getElementById('fallback-message').textContent = msg;
    }
   document.addEventListener('DOMContentLoaded', function () {
      var params    = new URLSearchParams(window.location.search);
      var studentId = params.get('id') ? params.get('id').trim() : '';

      _mode = (studentId === 'new' || !studentId) ? 'new' : 'existing';

      if (_mode === 'new') {
        // ... (existing new student logic)
        return;
      }

      _showLoading();

      // Add a explicit timeout to the fetch logic
      var controller = new AbortController();
      var timeoutId = setTimeout(function() { controller.abort(); }, 10000); // 10s timeout

      fetch(GAS_WEBHOOK_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify({ action: 'getRoster' }),
        signal:  controller.signal
      })
      .then(function(res) {
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error('HTTP status failure: ' + res.status);
        return res.json();
      })
      .then(function(data) {
        var rawRows = data.rows || [];
        _rosterRows = (rawRows.length > 0 && Array.isArray(rawRows[0]) && String(rawRows[0][0]).toLowerCase().includes('id')) ? rawRows.slice(1) : rawRows;
        _rosterRows = _rosterRows.filter(function(r) { return r && (r[COL_FIRST] || r[COL_LAST]); });

        _currentIdx = _rosterRows.findIndex(function (r) {
          return String(r[COL_ID] || '').trim().toLowerCase() === studentId.toLowerCase();
        });

        if (_currentIdx === -1) {
          throw new Error('Student ID "' + studentId + '" not found in ledger.');
        }

        document.getElementById('carouselNav').classList.remove('hidden');
        _refreshCarouselState();
        _renderStudentRow(_rosterRows[_currentIdx]);
        _showContent();
      })
      .catch(function(err) {
        console.error('[Engine Exception]:', err);
        _showFallback('Data Retrieval Error', err.name === 'AbortError' ? 'Request timed out.' : err.message);
      });
    });
  </script>
</body>
</html>
