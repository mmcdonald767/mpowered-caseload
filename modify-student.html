<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f1117; color: #e8ecf4; font-family: sans-serif; }
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .btn { cursor: pointer; padding: 0.35rem 0.8rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; border: 1px solid transparent; }
    .btn-edit { background: rgba(108,143,255,0.1); color: #6c8fff; }
    .btn-save { background: rgba(52,211,153,0.1); color: #34d399; }
    .goal-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center; }
    .field-input { background: #0f1117; border: 1px solid #252c42; padding: 0.5rem; width: 100%; color: #fff; border-radius: 6px; }
    #content-area { display: none; }
    #content-area.active { display: block; }
  </style>
</head>
<body class="p-6">
  <main id="content-area" class="active max-w-3xl mx-auto">
    
    <div class="panel" id="panel-goals">
      <div class="flex justify-between mb-4">
        <span class="font-bold">IEP Goals & SDI</span>
        <button class="btn btn-edit" onclick="App.editPanel('goals')">Edit</button>
      </div>
      
      <div id="view-goals">
        <ul id="goals-list" class="space-y-3"></ul>
      </div>

      <div id="edit-goals" style="display:none;">
        <div id="goal-rows" class="mb-4"></div>
        <button class="btn btn-edit" onclick="App.addGoalRow('', '')">+ Add Goal & SDI Pair</button>
        <button class="btn btn-save block mt-4" onclick="App.savePanel('goals')">Save Changes</button>
      </div>
    </div>
  </main>

  <script>
    var COL = { GOALS: 9 }; // Ensure this matches your sheet
    var _record = [];

    window.App = (function() {
      return {
        editPanel: function(panel) {
          document.getElementById('view-' + panel).style.display = 'none';
          document.getElementById('edit-' + panel).style.display = 'block';
          
          if(panel === 'goals') {
            var container = document.getElementById('goal-rows');
            container.innerHTML = '';
            var goals = JSON.parse(_record[COL.GOALS] || '[]');
            goals.forEach(function(g) { App.addGoalRow(g.description, g.sdi); });
          }
        },
        
        addGoalRow: function(desc, sdi) {
          var div = document.createElement('div');
          div.className = 'goal-row';
          div.innerHTML = `
            <input class="field-input goal-input" placeholder="Goal" value="${desc || ''}">
            <input class="field-input sdi-input" placeholder="SDI" value="${sdi || ''}">
            <button class="btn btn-edit" onclick="this.parentElement.remove()">×</button>
          `;
          document.getElementById('goal-rows').appendChild(div);
        },

        savePanel: function(panel) {
          if(panel === 'goals') {
            var rows = document.querySelectorAll('.goal-row');
            var merged = Array.from(rows).map(function(row) {
              return {
                description: row.querySelector('.goal-input').value,
                sdi: row.querySelector('.sdi-input').value
              };
            });
            console.log("Saving unified goals:", merged);
            // Here you would trigger _gasPost with updates[COL.GOALS] = JSON.stringify(merged);
          }
          document.getElementById('view-' + panel).style.display = 'block';
          document.getElementById('edit-' + panel).style.display = 'none';
        }
      };
    })();
  </script>
</body>
</html>
