<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 16px; padding: 1.75rem; }
    #loading-overlay { display: flex; }
    #loading-overlay.hidden { display: none; }
    #content-area { display: none; }
    #content-area.visible { display: block; }
    #fallback-state { display: none; }
    #fallback-state.visible { display: flex; }
  </style>
</head>
<body class="bg-surface-900 text-slate-100 min-h-screen flex flex-col">

  <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-8" id="main-root">
    
    <div id="loading-overlay" class="flex flex-col items-center justify-center py-24">
      <p class="font-mono text-xs text-slate-500">Retrieving student ledger record…</p>
    </div>

    <div id="fallback-state" class="flex-col items-center justify-center py-24" role="alert">
       <h2 id="fallback-title" class="text-base font-semibold">Record Not Found</h2>
       <p id="fallback-message" class="text-sm text-slate-500"></p>
    </div>

    <div id="content-area">
      <div class="panel mb-5">
        <h1 id="display-name" class="text-xl font-bold">Loading...</h1>
      </div>
      <section id="sec-identity" class="panel mb-5">
        <div class="section-heading">
          <h2 class="text-base font-semibold">Student Identifiers</h2>
        </div>
        <div id="sec-identity-body">
          <div class="read-view"><p id="rv-firstName">—</p></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    'use strict';
    var GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbybVEYwsl68FUfUBlOM5aWJXgtbH38mjcjFns0QkY5Patls-QJiSOO3eazstDhOMfJg/exec';
    
    // UI HELPER FUNCTIONS
    function _showLoading() {
      var el = document.getElementById('loading-overlay'); if (el) el.classList.remove('hidden');
      var content = document.getElementById('content-area'); if (content) content.classList.remove('visible');
    }
    function _showContent() {
      var overlay = document.getElementById('loading-overlay'); if (overlay) overlay.classList.add('hidden');
      var content = document.getElementById('content-area'); if (content) content.classList.add('visible');
    }
    function _showFallback(title, msg) {
      var overlay = document.getElementById('loading-overlay'); if (overlay) overlay.classList.add('hidden');
      var fallback = document.getElementById('fallback-state'); if (fallback) fallback.classList.add('visible');
      if (title) document.getElementById('fallback-title').textContent = title;
      if (msg) document.getElementById('fallback-message').textContent = msg;
    }

    // DATA COLLECTION FUNCTIONS
    function _collectGoalsFromEditRows() {
      var goals = [];
      document.querySelectorAll('#goals-edit-container [data-goal-id]').forEach(function(row) {
        var id = row.getAttribute('data-goal-id');
        var desc = (document.getElementById('goal-desc-' + id) || {}).value || '';
        goals.push({ description: desc.trim() });
      });
      return goals;
    }

    function _collectStateAccommodations() {
      return { selections: [] };
    }

    // MAIN INITIALIZATION
    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      var studentId = params.get('id');

      if (!studentId) {
        _showFallback('Missing ID', 'No student ID provided in URL.');
        return;
      }

      _showLoading();

      fetch(GAS_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'getRoster' })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
       // Target the first column (index 0) of the row array for comparison
var match = (data.rows || []).find(function(r) { 
  return String(r || '').trim().toLowerCase() === studentId.trim().toLowerCase(); 
});
        if (!match) {
          _showFallback('Not Found', 'Student ID not in ledger.');
        } else {
document.getElementById('display-name').textContent = (match || '') + ' ' + (match || '');          _showContent();
        }
      })
      .catch(function(err) {
        _showFallback('Data Retrieval Error', err.message);
      });
    });
  </script>
</body>
</html>
