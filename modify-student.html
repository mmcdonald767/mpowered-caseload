<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 16px; padding: 1.75rem; }
    #loading-overlay { display: flex; }
    #loading-overlay.hidden { display: none; }
    #content-area { display: none; }
    #content-area.visible { display: block; }
    #fallback-state { display: none; }
    #fallback-state.visible { display: flex; }
  </style>
</head>
<body class="bg-surface-900 text-slate-100 min-h-screen flex flex-col">

  <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-8" id="main-root">

    <div id="loading-overlay" class="flex flex-col items-center justify-center py-24">
      <p class="font-mono text-xs text-slate-500">Retrieving student ledger record…</p>
    </div>

    <div id="fallback-state" class="flex-col items-center justify-center py-24" role="alert">
      <h2 id="fallback-title" class="text-base font-semibold">Record Not Found</h2>
      <p id="fallback-message" class="text-sm text-slate-500 mt-1"></p>
    </div>

    <div id="content-area">
      <div class="panel mb-5">
        <h1 id="display-name" class="text-xl font-bold"></h1>
      </div>

      <section class="panel mb-5">
        <h2 class="text-base font-semibold mb-3">Student Identifiers</h2>
        <div class="grid grid-cols-2 gap-4 text-sm text-slate-300">
          <p><span class="text-slate-500 font-mono text-xs uppercase block">Student ID</span><span id="rv-studentId"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">First Name</span><span id="rv-firstName"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">Last Name</span><span id="rv-lastName"></span></p>
        </div>
      </section>

      <section class="panel mb-5">
        <h2 class="text-base font-semibold mb-3">Academic Status</h2>
        <div class="grid grid-cols-2 gap-4 text-sm text-slate-300">
          <p><span class="text-slate-500 font-mono text-xs uppercase block">Disability</span><span id="rv-disability"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">IEP Start</span><span id="rv-iepStart"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">IEP End</span><span id="rv-iepEnd"></span></p>
        </div>
      </section>
    </div>

  </main>

  <script>
    'use strict';

    function setText(id, value) {
      var el = document.getElementById(id);
      if (el) el.textContent = (value !== null && value !== undefined) ? String(value) : '—';
    }

    function showState(state) {
      var states = ['loading-overlay', 'fallback-state', 'content-area'];
      states.forEach(function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle('visible', id === state);
        if (id !== 'content-area' && id !== 'fallback-state') el.classList.toggle('hidden', id !== state);
      });
    }

    function normalise(value) {
      return String(value || '').replace(/^["'\s]+|["'\s]+$/g, '').toLowerCase();
    }

    // ─── UPDATED Column schema to match index.html/Code.gs ───
    var COL = {
      ID:         1,
      FIRST_NAME: 2,
      LAST_NAME:  3,
      IEP_START:  4,
      IEP_END:    5,
      DISABILITY: 6
    };

    document.addEventListener('DOMContentLoaded', function () {
      var params    = new URLSearchParams(window.location.search);
      var studentId = params.get('id');

      if (!studentId) {
        showState('fallback-state');
        setText('fallback-message', 'No ID provided.');
        return;
      }

      var searchId = normalise(studentId);
      showState('loading-overlay');

      var GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbybVEYwsl68FUfUBlOM5aWJXgtbH38mjcjFns0QkY5Patls-QJiSOO3eazstDhOMfJg/exec';

      fetch(GAS_WEBHOOK_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify({ action: 'getRoster' })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var rows = data.rows || [];
        var match = rows.find(function (row) {
          return Array.isArray(row) && normalise(row[COL.ID]) === searchId;
        });

        if (!match) {
          showState('fallback-state');
          setText('fallback-message', 'No record found for ID: ' + studentId);
          return;
        }

        // Populate Fields
        setText('display-name',  match[COL.FIRST_NAME] + ' ' + match[COL.LAST_NAME]);
        setText('rv-studentId',  match[COL.ID]);
        setText('rv-firstName',  match[COL.FIRST_NAME]);
        setText('rv-lastName',   match[COL.LAST_NAME]);
        setText('rv-disability', match[COL.DISABILITY]);
        setText('rv-iepStart',   match[COL.IEP_START]);
        setText('rv-iepEnd',     match[COL.IEP_END]);

        showState('content-area');
      })
      .catch(function (err) {
        showState('fallback-state');
        setText('fallback-message', 'Fetch error: ' + err.message);
      });
    });
  </script>
</body>
</html>
