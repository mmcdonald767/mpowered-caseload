<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 16px; padding: 1.75rem; }
    #loading-overlay { display: flex; }
    #loading-overlay.hidden { display: none; }
    #content-area { display: none; }
    #content-area.visible { display: block; }
    #fallback-state { display: none; }
    #fallback-state.visible { display: flex; }
  </style>
</head>
<body class="bg-surface-900 text-slate-100 min-h-screen flex flex-col">

  <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-8" id="main-root">
    <div id="loading-overlay" class="flex flex-col items-center justify-center py-24">
      <p class="font-mono text-xs text-slate-500">Retrieving student ledger record…</p>
    </div>

    <div id="fallback-state" class="flex-col items-center justify-center py-24" role="alert">
       <h2 id="fallback-title" class="text-base font-semibold">Record Not Found</h2>
       <p id="fallback-message" class="text-sm text-slate-500"></p>
    </div>

    <div id="content-area">
      <div class="panel mb-5">
        <h1 id="display-name" class="text-xl font-bold"></h1>
      </div>
      <section id="sec-identity" class="panel mb-5">
        <h2 class="text-base font-semibold mb-2">Student Identifiers</h2>
        <div id="sec-identity-body">
          <p id="rv-firstName">—</p>
        </div>
      </section>
    </div>
  </main>

  <script>
    'use strict';
    if (!window.mpowered_initialized) {
        window.mpowered_initialized = true;
        var GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbybVEYwsl68FUfUBlOM5aWJXgtbH38mjcjFns0QkY5Patls-QJiSOO3eazstDhOMfJg/exec';

        document.addEventListener('DOMContentLoaded', function () {
          var params = new URLSearchParams(window.location.search);
          var studentId = params.get('id');

          if (!studentId) {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('fallback-state').classList.add('visible');
            return;
          }

          fetch(GAS_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'getRoster' })
          })
          .then(function(res) { return res.json(); })
          .then(function(data) {
            var rows = data.rows || [];
            var searchId = studentId.trim().toLowerCase();
            
            var match = rows.find(function(r) { 
              return String(r || '').replace(/["']/g, '').trim().toLowerCase() === searchId; 
            });

            if (match && Array.isArray(match)) {
              var nameEl = document.getElementById('display-name');
              var idEl = document.getElementById('rv-firstName');
              var loading = document.getElementById('loading-overlay');
              var contentArea = document.getElementById('content-area');

              if (nameEl) nameEl.textContent = (match || '') + ' ' + (match || '');
              if (idEl) idEl.textContent = (match || 'Unknown');
              
              if (loading) loading.classList.add('hidden');
              if (contentArea) contentArea.classList.add('visible');
            } else {
              var loading = document.getElementById('loading-overlay');
              var fallback = document.getElementById('fallback-state');
              if (loading) loading.classList.add('hidden');
              if (fallback) fallback.classList.add('visible');
              document.getElementById('fallback-message').textContent = 'Data error: Could not process record for "' + studentId + '".';
            }
          })
          .catch(function(err) {
            var loading = document.getElementById('loading-overlay');
            var fallback = document.getElementById('fallback-state');
            if (loading) loading.classList.add('hidden');
            if (fallback) fallback.classList.add('visible');
            document.getElementById('fallback-message').textContent = err.message;
          });
        });
    }
  </script>
</body>
</html>
