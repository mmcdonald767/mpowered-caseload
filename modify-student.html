<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Record — M-Powered Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure background is set even if tailwind fails */
    body { background-color: #0f1117 !important; }
    .panel { background: #171b26; border: 1px solid #1e2335; border-radius: 16px; padding: 1.75rem; }
    .btn-action {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(108,143,255,0.08); color: #6c8fff;
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
      border: 1px solid rgba(108,143,255,0.25); border-radius: 6px;
      padding: 0.3rem 0.75rem; cursor: pointer; transition: background 0.14s;
    }
    .btn-action:hover { background: rgba(108,143,255,0.16); }
    #loading-overlay { display: none; }
    #content-area { display: none; }
    #fallback-state { display: none; }
    /* Visible state helpers */
    .visible { display: flex !important; }
    #content-area.visible { display: block !important; }
  </style>
</head>
<body class="bg-[#0f1117] text-slate-100 min-h-screen flex flex-col">

  <main class="flex-1 max-w-3xl mx-auto w-full px-6 py-8" id="main-root">

    <div id="loading-overlay" class="visible flex-col items-center justify-center py-24">
      <p class="font-mono text-xs text-slate-500">Retrieving student ledger record…</p>
    </div>

    <div id="fallback-state" class="flex-col items-center justify-center py-24" role="alert">
      <h2 id="fallback-title" class="text-base font-semibold">Record Not Found</h2>
      <p id="fallback-message" class="text-sm text-slate-500 mt-1"></p>
    </div>

    <div id="content-area">
      <div class="panel mb-5">
        <h1 id="display-name" class="text-xl font-bold"></h1>
      </div>

      <section class="panel mb-5">
        <h2 class="text-base font-semibold mb-3">Student Identifiers</h2>
        <div class="grid grid-cols-2 gap-4 text-sm text-slate-300">
          <p><span class="text-slate-500 font-mono text-xs uppercase block">Student ID</span><span id="rv-studentId"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">First Name</span><span id="rv-firstName"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">Last Name</span><span id="rv-lastName"></span></p>
        </div>
      </section>

      <section class="panel mb-5">
        <h2 class="text-base font-semibold mb-3">Academic Status</h2>
        <div class="grid grid-cols-2 gap-4 text-sm text-slate-300">
          <p><span class="text-slate-500 font-mono text-xs uppercase block">Disability</span><span id="rv-disability"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">IEP Start</span><span id="rv-iepStart"></span></p>
          <p><span class="text-slate-500 font-mono text-xs uppercase block">IEP End</span><span id="rv-iepEnd"></span></p>
        </div>
      </section>

      <section class="panel mb-5">
        <h2 class="text-base font-semibold mb-3">IEP Goals</h2>
        <ul id="rv-goals" class="space-y-2 mb-4"></ul>
        <button class="btn-action">Edit Goals</button>
      </section>

      <section class="panel mb-5">
        <h2 class="text-base font-semibold mb-3">Accommodations</h2>
        <ul id="rv-accommodations" class="space-y-2 mb-4"></ul>
        <button class="btn-action">Edit Accommodations</button>
      </section>
    </div>

  </main>

  <script>
    'use strict';

    function setText(id, value) {
      var el = document.getElementById(id);
      if (el) el.textContent = (value !== null && value !== undefined) ? String(value) : '—';
    }

    function renderList(id, rawData) {
  var container = document.getElementById(id);
  if (!container) return;
  container.innerHTML = '';
  
  var items = [];
  try {
    // 1. If it's a JSON string, parse it.
    if (typeof rawData === 'string') {
      items = JSON.parse(rawData || '[]');
    } 
    // 2. If it's already an object/array, use it.
    else {
      items = rawData;
    }

    // 3. CRITICAL: Force items to be an empty array if it's not an array at all
    if (!Array.isArray(items)) {
      items = [];
    }
  } catch (e) {
    container.innerHTML = '<li class="text-xs text-red-400">Error parsing list data.</li>';
    return;
  }

  if (items.length === 0) {
    container.innerHTML = '<li class="text-xs text-slate-500 italic">No data recorded.</li>';
  } else {
    items.forEach(function(item) {
      var li = document.createElement('li');
      li.className = 'text-sm text-slate-300 bg-slate-800/50 p-3 rounded-lg border border-slate-700';
      // Ensure we render the item as a string
      li.textContent = (typeof item === 'object') ? JSON.stringify(item) : item;
      container.appendChild(li);
    });
  }
}

    function showState(state) {
      document.getElementById('loading-overlay').classList.toggle('visible', state === 'loading');
      document.getElementById('fallback-state').classList.toggle('visible', state === 'error');
      document.getElementById('content-area').classList.toggle('visible', state === 'data');
    }

    function normalise(value) {
      return String(value || '').replace(/^["'\s]+|["'\s]+$/g, '').toLowerCase();
    }

    var COL = { ID: 1, FIRST_NAME: 2, LAST_NAME: 3, IEP_START: 4, IEP_END: 5, DISABILITY: 6, SUPPLEMENTAL: 7, GOALS: 8, ACCOMMODATIONS: 9 };

    document.addEventListener('DOMContentLoaded', function () {
      var params = new URLSearchParams(window.location.search);
      var studentId = params.get('id');

      if (!studentId) {
        showState('error');
        setText('fallback-message', 'No ID provided.');
        return;
      }

      var searchId = normalise(studentId);
      
      fetch('https://script.google.com/macros/s/AKfycbybVEYwsl68FUfUBlOM5aWJXgtbH38mjcjFns0QkY5Patls-QJiSOO3eazstDhOMfJg/exec', {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify({ action: 'getRoster' })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var match = (data.rows || []).find(function (row) {
          return Array.isArray(row) && normalise(row[COL.ID]) === searchId;
        });

        if (!match) {
          showState('error');
          setText('fallback-message', 'No record found.');
          return;
        }

        setText('display-name',  match[COL.FIRST_NAME] + ' ' + match[COL.LAST_NAME]);
        setText('rv-studentId',  match[COL.ID]);
        setText('rv-firstName',  match[COL.FIRST_NAME]);
        setText('rv-lastName',   match[COL.LAST_NAME]);
        setText('rv-disability', match[COL.DISABILITY]);
        setText('rv-iepStart',   match[COL.IEP_START]);
        setText('rv-iepEnd',     match[COL.IEP_END]);
        
        renderList('rv-goals', match[COL.GOALS]);
        renderList('rv-accommodations', match[COL.ACCOMMODATIONS]);

        showState('data');
      })
      .catch(function (err) {
        showState('error');
        setText('fallback-message', 'Fetch error: ' + err.message);
      });
    });
  </script>
</body>
</html>
